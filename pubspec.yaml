name: nti_hub_app
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.0
  device_preview: ^1.3.1
  flutter_bloc: ^9.1.1
  smooth_page_indicator: ^2.0.1
  shared_preferences: ^2.5.5
  get_it: ^9.2.1
  meta: ^1.17.0
  bloc: ^9.2.0
  cloud_firestore: ^6.2.0
  firebase_core: ^4.6.0
  cloudinary_public: ^0.23.1
  google_maps_flutter: ^2.17.0
  url_launcher: ^6.3.2
  skeletonizer: ^2.1.3
  firebase_auth: ^6.4.0
  email_validator: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appIcon.jpeg"
  
flutter:

  uses-material-design: true

  assets:
    - assets/images/
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  
